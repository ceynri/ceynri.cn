name: CI Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# 并发控制：同一 PR 的旧 CI 自动取消
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true
          cache: pnpm

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('astro.config.*') }}-${{ hashFiles('src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('astro.config.*') }}-
            ${{ runner.os }}-astro-

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Type check
        run: pnpm exec astro check

      - name: Lint
        run: pnpm exec biome ci ./src ./astro.config.ts

      - name: Build
        run: pnpm exec astro build

      - name: Check broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --root-dir ./dist './dist/**/*.html'
          fail: true
